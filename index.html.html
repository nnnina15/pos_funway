<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風味食堂 POS 系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; color: #222; }

  /* Header */
  .header {
    background: #1a1a2e;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header h1 { font-size: 20px; letter-spacing: 2px; }
  .header .info { font-size: 12px; opacity: 0.7; text-align: right; }

  /* Layout */
  .container { display: flex; height: calc(100vh - 54px); }

  /* Left: Menu */
  .menu-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    background: #f0f2f5;
  }

  /* Category tabs */
  .cat-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    position: sticky; top: 0;
    background: #f0f2f5;
    padding: 8px 0;
    z-index: 10;
  }
  .cat-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid #1a1a2e;
    background: white;
    color: #1a1a2e;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .cat-tab:hover, .cat-tab.active {
    background: #1a1a2e;
    color: white;
  }

  /* Category section */
  .cat-section { margin-bottom: 20px; }
  .cat-title {
    font-size: 15px;
    font-weight: 700;
    background: #1a1a2e;
    color: white;
    padding: 6px 14px;
    border-radius: 6px 6px 0 0;
    margin-bottom: 2px;
  }
  .cat-items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    padding: 10px;
    background: white;
    border-radius: 0 0 6px 6px;
    border: 1px solid #ddd;
    border-top: none;
  }

  /* Menu item card */
  .item-card {
    background: #fafafa;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    user-select: none;
  }
  .item-card:hover { border-color: #e74c3c; background: #fff5f5; transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
  .item-card:active { transform: translateY(0); }
  .item-card .name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .item-card .price { font-size: 16px; font-weight: 700; color: #e74c3c; }
  .item-card .spicy { font-size: 11px; color: #e74c3c; }

  /* Stir-fry special card */
  .stirfry-card {
    background: #fff8e7;
    border: 1.5px solid #f0c040;
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .stirfry-card:hover { border-color: #e74c3c; background: #fff5f5; transform: translateY(-1px); }
  .stirfry-card .name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .stirfry-card .price { font-size: 16px; font-weight: 700; color: #c0720c; }

  /* Right: Cart */
  .cart-panel {
    width: 360px;
    min-width: 320px;
    background: white;
    display: flex;
    flex-direction: column;
    border-left: 2px solid #e0e0e0;
  }
  .cart-header {
    background: #e74c3c;
    color: white;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 8px;
    border-bottom: 1px solid #eee;
    background: #fafafa;
  }
  .table-row label { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .table-row input {
    flex: 1;
    padding: 6px 10px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
    font-weight: 600;
  }
  .table-row input:focus { outline: none; border-color: #e74c3c; }

  .cart-items { flex: 1; overflow-y: auto; padding: 10px; }
  .cart-empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }

  .cart-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #eee;
    margin-bottom: 6px;
    background: #fafafa;
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 13px; font-weight: 600; }
  .cart-item-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .cart-item-price { font-size: 13px; font-weight: 700; color: #e74c3c; white-space: nowrap; }
  .qty-ctrl { display: flex; align-items: center; gap: 4px; }
  .qty-btn {
    width: 24px; height: 24px;
    border: 1.5px solid #ddd;
    border-radius: 4px;
    background: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    color: #555;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-btn:hover { background: #e74c3c; color: white; border-color: #e74c3c; }
  .qty-num { font-size: 14px; font-weight: 700; min-width: 20px; text-align: center; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 16px; padding: 2px;
    line-height: 1;
  }
  .del-btn:hover { color: #e74c3c; }

  /* Remark */
  .remark-row {
    padding: 0 10px 6px;
  }
  .remark-row textarea {
    width: 100%; padding: 6px 10px;
    border: 1.5px solid #ddd; border-radius: 6px;
    font-size: 12px; resize: none; height: 46px;
    font-family: inherit;
  }
  .remark-row textarea:focus { outline: none; border-color: #e74c3c; }

  /* Cart footer */
  .cart-footer {
    border-top: 2px solid #eee;
    padding: 12px 16px;
    background: white;
  }
  .subtotal-row {
    display: flex; justify-content: space-between;
    font-size: 13px; color: #666; margin-bottom: 4px;
  }
  .total-row {
    display: flex; justify-content: space-between;
    font-size: 20px; font-weight: 700;
    color: #e74c3c; margin-bottom: 12px;
    padding-top: 6px; border-top: 1.5px solid #eee;
  }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 12px;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-clear { background: #f0f0f0; color: #555; }
  .btn-clear:hover { background: #ddd; }
  .btn-print { background: #27ae60; color: white; }
  .btn-print:hover { background: #219a52; }
  .btn-order { background: #e74c3c; color: white; flex: 2; }
  .btn-order:hover { background: #c0392b; }

  /* Modal: stir-fry selector */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    padding: 24px;
    width: 480px;
    max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 18px; margin-bottom: 16px; color: #1a1a2e; }
  .modal-section { margin-bottom: 16px; }
  .modal-section label { font-size: 13px; font-weight: 700; color: #555; display: block; margin-bottom: 8px; }
  .option-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt-btn {
    padding: 8px 14px;
    border: 2px solid #ddd;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .opt-btn:hover { border-color: #e74c3c; }
  .opt-btn.selected { background: #e74c3c; color: white; border-color: #e74c3c; }
  .opt-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .modal-price { font-size: 22px; font-weight: 700; color: #e74c3c; text-align: center; margin: 12px 0; }
  .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
  .modal-btns .btn { padding: 10px; }

  /* Print */
  @media print {
    .menu-panel, .cart-header .clear-icon, .btn-row, .qty-btn, .del-btn, .cat-tabs, .table-row input { display: none !important; }
    .cart-panel { width: 100%; border: none; }
    .container { height: auto; }
    body { background: white; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f0f0f0; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🍳 風味食堂 POS</h1>
  </div>
  <div class="info">
    彰化市大埔路523號｜0983606697<br>
    10:30-13:30 / 16:00-21:00（週六公休）
  </div>
</div>

<div class="container">

  <!-- Left Menu -->
  <div class="menu-panel" id="menuPanel">
    <div class="cat-tabs">
      <div class="cat-tab active" onclick="scrollTo('stirfry')">風味現炒</div>
      <div class="cat-tab" onclick="scrollTo('rice')">炒飯</div>
      <div class="cat-tab" onclick="scrollTo('noodle')">炒麵</div>
      <div class="cat-tab" onclick="scrollTo('soup')">例湯</div>
      <div class="cat-tab" onclick="scrollTo('chef')">主廚手路菜</div>
      <div class="cat-tab" onclick="scrollTo('other')">其他</div>
    </div>

    <!-- 風味現炒 -->
    <div class="cat-section" id="stirfry">
      <div class="cat-title">🥘 風味現炒（來電/現場附白飯一碗）</div>
      <div class="cat-items">
        <div class="stirfry-card" onclick="openStirfry('豬柳', 140)">
          <div class="name">豬柳</div>
          <div class="price">$140 起</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">選醬料</div>
        </div>
        <div class="stirfry-card" onclick="openStirfry('雞肉', 140)">
          <div class="name">雞肉</div>
          <div class="price">$140 起</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">選醬料</div>
        </div>
        <div class="stirfry-card" onclick="openStirfry('牛肉', 150)">
          <div class="name">牛肉</div>
          <div class="price">$150 起</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">選醬料</div>
        </div>
        <div class="stirfry-card" onclick="openStirfry('松板豬', 170)">
          <div class="name">松板豬</div>
          <div class="price">$170 起</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">選醬料</div>
        </div>
      </div>
    </div>

    <!-- 風味炒飯 -->
    <div class="cat-section" id="rice">
      <div class="cat-title">🍳 風味炒飯</div>
      <div class="cat-items" id="rice-items"></div>
    </div>

    <!-- 風味炒麵 -->
    <div class="cat-section" id="noodle">
      <div class="cat-title">🍜 風味炒麵</div>
      <div class="cat-items" id="noodle-items"></div>
    </div>

    <!-- 例湯 -->
    <div class="cat-section" id="soup">
      <div class="cat-title">🍲 風味例湯</div>
      <div class="cat-items" id="soup-items"></div>
    </div>

    <!-- 主廚手路菜 -->
    <div class="cat-section" id="chef">
      <div class="cat-title">👨‍🍳 主廚手路菜</div>
      <div class="cat-items" id="chef-items"></div>
    </div>

    <!-- 其他 -->
    <div class="cat-section" id="other">
      <div class="cat-title">🥬 其他</div>
      <div class="cat-items" id="other-items"></div>
    </div>
  </div>

  <!-- Right Cart -->
  <div class="cart-panel">
    <div class="cart-header">
      <span>🧾 點餐明細</span>
      <span id="item-count" style="font-size:13px;opacity:0.9">共 0 項</span>
    </div>
    <div class="table-row">
      <label>桌號</label>
      <input type="text" id="tableNum" placeholder="請輸入桌號" maxlength="6">
      <label style="margin-left:8px;">人數</label>
      <input type="number" id="guestNum" placeholder="人" min="1" max="20" style="width:50px;flex:unset;">
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty" id="cartEmpty">尚未點餐，請選擇品項</div>
    </div>
    <div class="remark-row">
      <textarea id="remark" placeholder="備註（例：少油、不辣、加辣...）"></textarea>
    </div>
    <div class="cart-footer">
      <div class="subtotal-row">
        <span>小計</span>
        <span id="subtotal">$0</span>
      </div>
      <div class="total-row">
        <span>總金額</span>
        <span id="total">$0</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-clear" onclick="clearCart()">清空</button>
        <button class="btn btn-print" onclick="printOrder()">🖨️ 列印</button>
        <button class="btn btn-order" onclick="confirmOrder()">✅ 確認出單</button>
      </div>
    </div>
  </div>
</div>

<!-- Stir-fry Modal -->
<div class="modal-overlay" id="stirfryModal">
  <div class="modal">
    <h2 id="modal-title">選擇醬料</h2>
    <div class="modal-section">
      <label>醬料選擇</label>
      <div class="option-grid" id="sauce-options"></div>
    </div>
    <div class="modal-price" id="modal-price"></div>
    <div class="modal-btns">
      <button class="btn btn-clear" onclick="closeModal()">取消</button>
      <button class="btn btn-order" onclick="addStirfry()">加入訂單</button>
    </div>
  </div>
</div>

<!-- Print view -->
<div id="printArea" style="display:none"></div>

<script>
// ===== DATA =====
const SAUCES = ['蔥爆','三杯','沙茶','宮保','糖醋','泡菜','壽喜燒'];

// Available combinations (X = not available based on menu image)
// From the image, 壽喜燒 is not available for 豬柳 and 雞肉 (斜線格)
// 松板豬 not available for 壽喜燒
const SAUCE_RESTRICTIONS = {
  '豬柳':   ['蔥爆','三杯','沙茶','宮保','糖醋','泡菜'],
  '雞肉':   ['蔥爆','三杯','沙茶','宮保','糖醋','泡菜'],
  '牛肉':   ['蔥爆','三杯','沙茶','宮保','糖醋','泡菜','壽喜燒'],
  '松板豬': ['蔥爆','三杯','沙茶','宮保','糖醋','泡菜'],
};

const MENU = {
  rice: [
    { name: '火腿蛋炒飯', price: 75 },
    { name: '杏鮑菇蛋炒飯', price: 80 },
    { name: '肉絲蛋炒飯', price: 85 },
    { name: '蝦仁蛋炒飯', price: 90 },
    { name: '牛肉蛋炒飯', price: 95 },
    { name: '鹹豬肉蛋炒飯', price: 100 },
    { name: '日式鮭魚蛋炒飯', price: 100 },
  ],
  noodle: [
    { name: '肉絲炒麵', price: 85 },
    { name: '蝦仁炒麵', price: 90 },
    { name: '牛肉炒麵', price: 95 },
    { name: '鹹豬肉炒麵', price: 100 },
  ],
  soup: [
    { name: '香菇菇燉雞湯', price: 55 },
    { name: '鳳梨苦瓜雞湯', price: 55 },
    { name: '蒜味蛤蜊雞湯', price: 55 },
    { name: '剝皮辣椒雞湯', price: 55 },
    { name: '日式茶碗蒸湯', price: 55 },
    { name: '茶樹菇排骨湯', price: 55 },
    { name: '肝鏈湯', price: 45 },
    { name: '貢丸湯', price: 35 },
  ],
  chef: [
    { name: '梅林醬豆腐', price: 100 },
    { name: '經典金沙豆腐', price: 110 },
    { name: '塔香蛤蜊', price: 110 },
    { name: '京都排骨', price: 120 },
    { name: '韓式洋釀炸雞', price: 120 },
    { name: '客家小炒', price: 130 },
    { name: '蔥爆鹹豬肉', price: 130 },
    { name: '川味水煮豬', price: 150, spicy: true },
    { name: '川味水煮牛', price: 160, spicy: true },
    { name: '川味水煮魚', price: 160, spicy: true },
    { name: '麻油松板豬', price: 170, spicy: true },
    { name: '老罈酸菜豬', price: 180, spicy: true },
    { name: '老罈酸菜牛', price: 190, spicy: true },
    { name: '老罈酸菜魚', price: 190, spicy: true },
  ],
  other: [
    { name: '炒空心菜', price: 60 },
    { name: '炒高麗菜', price: 60 },
    { name: '九層塔蛋', price: 65 },
    { name: '蔥蛋', price: 65 },
    { name: '風味白飯', price: 15 },
  ],
};

// ===== RENDER MENU =====
function renderMenu(category, containerId) {
  const container = document.getElementById(containerId);
  MENU[category].forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `
      <div class="name">${item.name}</div>
      <div class="price">$${item.price}</div>
      ${item.spicy ? '<div class="spicy">🌶 微辣</div>' : ''}
    `;
    card.onclick = () => addToCart(item.name, item.price, '');
    container.appendChild(card);
  });
}

renderMenu('rice', 'rice-items');
renderMenu('noodle', 'noodle-items');
renderMenu('soup', 'soup-items');
renderMenu('chef', 'chef-items');
renderMenu('other', 'other-items');

// ===== CART =====
let cart = [];
let orderCount = 0;

function addToCart(name, price, sub, qty = 1) {
  const existing = cart.find(i => i.name === name && i.sub === sub);
  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({ id: ++orderCount, name, price, sub, qty });
  }
  renderCart();
  // flash feedback
  showToast(`已加入：${name}${sub ? ' ' + sub : ''}`);
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  renderCart();
}

function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  renderCart();
}

function clearCart() {
  if (cart.length === 0) return;
  if (confirm('確定清空所有點餐？')) {
    cart = [];
    renderCart();
  }
}

function renderCart() {
  const container = document.getElementById('cartItems');
  const empty = document.getElementById('cartEmpty');
  const countEl = document.getElementById('item-count');
  const subtotalEl = document.getElementById('subtotal');
  const totalEl = document.getElementById('total');

  if (cart.length === 0) {
    container.innerHTML = '<div class="cart-empty">尚未點餐，請選擇品項</div>';
    countEl.textContent = '共 0 項';
    subtotalEl.textContent = '$0';
    totalEl.textContent = '$0';
    return;
  }

  let total = 0;
  let totalQty = 0;
  let html = '';
  cart.forEach(item => {
    const lineTotal = item.price * item.qty;
    total += lineTotal;
    totalQty += item.qty;
    html += `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          ${item.sub ? `<div class="cart-item-sub">${item.sub}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">－</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">＋</button>
          </div>
          <div class="cart-item-price">$${lineTotal}</div>
        </div>
        <button class="del-btn" onclick="removeItem(${item.id})" title="刪除">✕</button>
      </div>
    `;
  });

  container.innerHTML = html;
  countEl.textContent = `共 ${totalQty} 項`;
  subtotalEl.textContent = `$${total}`;
  totalEl.textContent = `$${total}`;
}

// ===== STIR-FRY MODAL =====
let sfMeat = '';
let sfBasePrice = 0;
let sfSauce = '';

function openStirfry(meat, price) {
  sfMeat = meat;
  sfBasePrice = price;
  sfSauce = '';
  document.getElementById('modal-title').textContent = `風味現炒 — ${meat}`;
  document.getElementById('modal-price').textContent = `$${price}`;
  const available = SAUCE_RESTRICTIONS[meat] || SAUCES;
  const container = document.getElementById('sauce-options');
  container.innerHTML = '';
  SAUCES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = s;
    if (!available.includes(s)) {
      btn.disabled = true;
    } else {
      btn.onclick = () => {
        document.querySelectorAll('#sauce-options .opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        sfSauce = s;
      };
    }
    container.appendChild(btn);
  });
  document.getElementById('stirfryModal').classList.add('open');
}

function closeModal() {
  document.getElementById('stirfryModal').classList.remove('open');
}

function addStirfry() {
  if (!sfSauce) { alert('請選擇醬料！'); return; }
  addToCart(`現炒${sfMeat}`, sfBasePrice, `【${sfSauce}】`);
  closeModal();
}

// ===== CONFIRM ORDER =====
function confirmOrder() {
  if (cart.length === 0) { alert('請先選擇餐點！'); return; }
  const table = document.getElementById('tableNum').value.trim();
  if (!table) { alert('請輸入桌號！'); return; }
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const now = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  alert(`✅ 出單成功！\n桌號：${table}\n時間：${now}\n總金額：$${total}\n\n請確認廚房已收到訂單。`);
}

// ===== PRINT =====
function printOrder() {
  if (cart.length === 0) { alert('請先選擇餐點！'); return; }
  const table = document.getElementById('tableNum').value || '未填';
  const guests = document.getElementById('guestNum').value || '-';
  const remark = document.getElementById('remark').value || '無';
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const now = new Date().toLocaleString('zh-TW');

  let rows = cart.map(i =>
    `<tr><td>${i.name}${i.sub ? ' ' + i.sub : ''}</td><td align="center">${i.qty}</td><td align="right">$${i.price * i.qty}</td></tr>`
  ).join('');

  const win = window.open('', '_blank', 'width=400,height=600');
  win.document.write(`
    <html><head><title>出單</title>
    <style>
      body{font-family:'Microsoft JhengHei',sans-serif;padding:20px;font-size:14px;}
      h2{text-align:center;font-size:18px;}
      .info{text-align:center;color:#555;margin-bottom:12px;font-size:12px;}
      table{width:100%;border-collapse:collapse;margin-top:10px;}
      th{border-bottom:2px solid #333;padding:6px 4px;font-size:13px;}
      td{padding:6px 4px;border-bottom:1px solid #eee;}
      .total{font-size:18px;font-weight:700;text-align:right;margin-top:10px;}
      .remark{margin-top:8px;font-size:12px;color:#555;}
    </style></head>
    <body>
    <h2>風味食堂</h2>
    <div class="info">彰化市大埔路523號 | TEL 0983606697</div>
    <div style="display:flex;justify-content:space-between;font-size:13px;">
      <span>桌號：<b>${table}</b></span>
      <span>人數：${guests}</span>
      <span>${now}</span>
    </div>
    <table>
      <tr><th align="left">品項</th><th>數量</th><th align="right">小計</th></tr>
      ${rows}
    </table>
    <div class="total">總金額：$${total}</div>
    <div class="remark">備註：${remark}</div>
    <br><div style="text-align:center;font-size:12px;color:#aaa;">謝謝光臨，敬請慢用 🙏</div>
    </body></html>
  `);
  win.document.close();
  win.print();
}

// ===== SCROLL TO =====
function scrollTo(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:#333;color:white;padding:8px 20px;border-radius:20px;
      font-size:13px;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 1500);
}

// Close modal on overlay click
document.getElementById('stirfryModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
