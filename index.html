<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>風味食堂 POS</title>
<style>
* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Microsoft JhengHei', Arial, sans-serif; background: #f0f2f5; font-size: 14px; -webkit-user-select: none; user-select: none; }
a, button, [onclick] { cursor: pointer; -webkit-tap-highlight-color: rgba(0,0,0,0.1); touch-action: manipulation; }

.tab-bar {
  background: #fff;
  border-bottom: 2px solid #ddd;
  padding: 6px 8px;
  white-space: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-bar button {
  display: inline-block;
  padding: 6px 12px;
  margin-right: 4px;
  border: 2px solid #1a1a2e;
  border-radius: 16px;
  background: #fff;
  color: #1a1a2e;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
.tab-bar button.active { background: #1a1a2e; color: #fff; }

.wrap {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  height: calc(100vh - 46px);
}

.menu-panel {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  -webkit-overflow-scrolling: touch;
}

.cat-block { margin-bottom: 14px; }
.cat-title {
  background: #1a1a2e;
  color: #fff;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: bold;
  border-radius: 4px 4px 0 0;
}
.cat-items {
  background: #fff;
  border: 1px solid #ddd;
  border-top: none;
  border-radius: 0 0 4px 4px;
  padding: 8px;
  overflow: hidden;
}
.cat-items:after { content: ''; display: table; clear: both; }

.item-card {
  float: left;
  width: 31%;
  margin: 1%;
  background: #fafafa;
  border: 1.5px solid #e0e0e0;
  border-radius: 6px;
  padding: 8px 4px;
  text-align: center;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(231,76,60,0.2);
}
.item-card:active { background: #ffe0e0; border-color: #e74c3c; }
.item-card .n { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
.item-card .p { font-size: 15px; font-weight: bold; color: #e74c3c; }
.item-card .sp { font-size: 10px; color: #e74c3c; }
.item-card.stirfry { background: #fff8e7; border-color: #f0c040; }
.item-card.stirfry .p { color: #c0720c; }

.cart-panel {
  width: 300px;
  min-width: 260px;
  background: #fff;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-orient: vertical;
  -webkit-flex-direction: column;
  flex-direction: column;
  border-left: 2px solid #ddd;
}
.cart-head {
  background: #e74c3c;
  color: #fff;
  padding: 10px 12px;
  font-weight: bold;
  font-size: 15px;
  overflow: hidden;
}
.cart-head span { float: right; font-size: 12px; opacity: .9; margin-top: 2px; }

.info-row {
  padding: 8px 10px;
  border-bottom: 1px solid #eee;
  background: #fafafa;
  overflow: hidden;
}
.info-row label { font-size: 12px; font-weight: bold; }
.info-row input {
  padding: 5px 8px;
  border: 1.5px solid #ddd;
  border-radius: 5px;
  font-size: 13px;
  text-align: center;
  font-weight: bold;
  width: 70px;
  margin-left: 4px;
}

.cart-list {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  -webkit-overflow-scrolling: touch;
}
.cart-empty { text-align: center; color: #bbb; padding: 30px 0; font-size: 13px; }

.cart-item {
  border: 1px solid #eee;
  border-radius: 6px;
  padding: 7px 8px;
  margin-bottom: 6px;
  background: #fafafa;
  overflow: hidden;
}
.ci-name { font-size: 13px; font-weight: bold; float: left; max-width: 55%; }
.ci-sub { font-size: 11px; color: #888; clear: left; margin-top: 1px; }
.ci-right { float: right; text-align: right; }
.ci-price { font-size: 13px; font-weight: bold; color: #e74c3c; }
.ci-ctrl { margin-top: 4px; }
.ci-ctrl button {
  width: 26px; height: 26px;
  border: 1.5px solid #ddd;
  border-radius: 4px;
  background: #fff;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  vertical-align: middle;
}
.ci-ctrl button:active { background: #e74c3c; color: #fff; border-color: #e74c3c; }
.ci-qty { display: inline-block; width: 22px; text-align: center; font-weight: bold; vertical-align: middle; }
.ci-del { float: right; background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 0 2px; }
.ci-del:active { color: #e74c3c; }

.remark-wrap { padding: 0 8px 6px; }
.remark-wrap textarea {
  width: 100%; padding: 6px 8px;
  border: 1.5px solid #ddd; border-radius: 5px;
  font-size: 12px; resize: none; height: 40px;
  font-family: inherit;
}

.cart-foot { border-top: 2px solid #eee; padding: 10px 12px; }
.total-row { overflow: hidden; margin-bottom: 10px; }
.total-row .label { float: left; font-size: 18px; font-weight: bold; }
.total-row .amount { float: right; font-size: 22px; font-weight: bold; color: #e74c3c; }
.btn-row { overflow: hidden; }
.btn-row button {
  float: left;
  padding: 11px 0;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  margin-right: 5px;
}
.btn-clear { width: 22%; background: #f0f0f0; color: #555; }
.btn-print { width: 32%; background: #27ae60; color: #fff; }
.btn-order { width: 40%; background: #e74c3c; color: #fff; margin-right: 0 !important; }

.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.55);
  z-index: 300;
}
.overlay.show { display: block; }
.modal {
  position: absolute;
  top: 50%; left: 50%;
  -webkit-transform: translate(-50%, -50%);
  transform: translate(-50%, -50%);
  background: #fff;
  border-radius: 10px;
  padding: 20px;
  width: 90%;
  max-width: 420px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 { font-size: 16px; margin-bottom: 14px; color: #1a1a2e; }
.modal-label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 8px; }
.sauce-grid { overflow: hidden; margin-bottom: 12px; }
.sauce-btn {
  float: left;
  margin: 3px;
  padding: 8px 12px;
  border: 2px solid #ddd;
  border-radius: 6px;
  background: #fff;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
.sauce-btn.sel { background: #e74c3c; color: #fff; border-color: #e74c3c; }
.sauce-btn:disabled { opacity: .3; }
.modal-price { text-align: center; font-size: 22px; font-weight: bold; color: #e74c3c; margin: 12px 0; }
.modal-btns { overflow: hidden; margin-top: 14px; }
.modal-btns button {
  float: left; width: 48%;
  padding: 11px 0;
  border: none; border-radius: 7px;
  font-size: 14px; font-weight: bold; cursor: pointer;
}
.modal-btns .m-cancel { background: #f0f0f0; color: #555; margin-right: 4%; }
.modal-btns .m-add { background: #e74c3c; color: #fff; }

.toast {
  display: none;
  position: fixed;
  bottom: 70px; left: 50%;
  -webkit-transform: translateX(-50%);
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 8px 18px;
  border-radius: 18px;
  font-size: 13px;
  z-index: 500;
  white-space: nowrap;
}

/* Print receipt overlay */
.print-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.6);
  z-index: 600;
}
.print-overlay.show { display: block; }
.receipt {
  position: absolute;
  top: 50%; left: 50%;
  -webkit-transform: translate(-50%,-50%);
  transform: translate(-50%,-50%);
  background: #fff;
  width: 300px;
  max-height: 85vh;
  overflow-y: auto;
  border-radius: 8px;
  padding: 20px 16px;
}
.receipt h2 { text-align: center; font-size: 18px; margin-bottom: 4px; }
.receipt .r-meta { font-size: 12px; margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 8px; }
.receipt table { width: 100%; border-collapse: collapse; }
.receipt th { border-bottom: 2px solid #333; padding: 4px 2px; font-size: 12px; }
.receipt td { padding: 5px 2px; border-bottom: 1px solid #eee; font-size: 13px; }
.receipt .r-qty { text-align: right; margin-top: 8px; font-size: 13px; color: #555; border-top: 1px dashed #ccc; padding-top: 6px; }
.receipt .r-total { font-size: 18px; font-weight: bold; text-align: right; margin-top: 4px; color: #e74c3c; }
.receipt .r-remark { font-size: 11px; color: #888; margin-top: 6px; }
.receipt .r-thanks { text-align: center; font-size: 12px; margin-top: 10px; color: #555; }
.receipt-btns { overflow: hidden; margin-top: 14px; }
.receipt-btns button {
  float: left; width: 48%;
  padding: 10px; border: none; border-radius: 6px;
  font-size: 14px; font-weight: bold; cursor: pointer;
}
.r-close { background: #f0f0f0; color: #555; margin-right: 4%; }
.r-print { background: #27ae60; color: #fff; }

/* Order type */
.otype-row { padding: 6px 10px; border-bottom: 1px solid #eee; background: #fff; overflow: hidden; }
.otype-btn {
  float: left; padding: 5px 12px; margin-right: 6px;
  border: 2px solid #ddd; border-radius: 16px;
  background: #fff; font-size: 12px; font-weight: bold; cursor: pointer;
  touch-action: manipulation;
}
.otype-btn.sel { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.take-num { display: inline-block; font-size: 22px; font-weight: bold; color: #e74c3c; margin-left: 8px; vertical-align: middle; }

/* Records */
.rec-overlay {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.6); z-index: 700;
}
.rec-overlay.show { display: block; }
.rec-box {
  position: absolute; top: 50%; left: 50%;
  -webkit-transform: translate(-50%,-50%);
  transform: translate(-50%,-50%);
  background: #fff; border-radius: 10px;
  width: 92%; max-width: 560px;
  max-height: 82vh; overflow: hidden;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
}
.rec-head {
  background: #1a1a2e; color: #fff;
  padding: 12px 16px; font-weight: bold; font-size: 15px;
  overflow: hidden;
}
.rec-head button {
  float: right; background: rgba(255,255,255,.2); border: none;
  color: #fff; border-radius: 5px; padding: 3px 10px;
  font-size: 13px; cursor: pointer;
}
.rec-list { -webkit-box-flex:1; -webkit-flex:1; flex:1; overflow-y: auto; padding: 10px; }
.rec-empty { text-align: center; color: #bbb; padding: 30px 0; }
.rec-item {
  border: 1px solid #eee; border-radius: 7px;
  margin-bottom: 8px; overflow: hidden;
}
.rec-item-head {
  background: #f5f5f5; padding: 7px 10px; overflow: hidden;
  font-size: 12px; font-weight: bold;
}
.rec-item-head .tag {
  display: inline-block; padding: 2px 8px;
  border-radius: 10px; font-size: 11px; margin-left: 6px;
}
.tag-dine { background: #e3f0ff; color: #1a6bb5; }
.tag-take { background: #fff3e0; color: #e67c00; }
.tag-deliver { background: #e8f5e9; color: #27ae60; }
.rec-item-head .rtotal { float: right; color: #e74c3c; font-size: 14px; }
.rec-item-head .r-reprint { float: right; margin-right: 8px; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
.rec-item-body { padding: 6px 10px; font-size: 12px; color: #555; }
.rec-item-body span { margin-right: 12px; }

@media print {
  .header, .tab-bar, .menu-panel, .cart-panel { display: none !important; }
  .wrap { display: none !important; }
  .print-overlay { display: block !important; position: static !important; background: none !important; }
  .receipt {
    position: static !important;
    -webkit-transform: none !important;
    transform: none !important;
    width: 100% !important;
    max-height: none !important;
    border-radius: 0 !important;
  }
  .receipt-btns { display: none !important; }
}
</style>
</head>

  var cats = ['rice','noodle','soup','chef','other'];
  for(var c=0;c<cats.length;c++){
    var cat = cats[c];
    var el = document.getElementById('items-'+cat);
    var items = MENU[cat];
    var html = '';
    for(var i=0;i<items.length;i++){
      var it = items[i];
      html += '<div class="item-card" ontouchend="tapItem(event,\''+it.n+'\','+it.p+')" onclick="addItem(\''+it.n+'\','+it.p+')">'
        +'<div class="n">'+it.n+'</div>'
        +'<div class="p">$'+it.p+'</div>'
        +(it.s ? '<div class="sp">&#x1F336;</div>' : '')
        +'</div>';
    }
    el.innerHTML = html;
  }
})();

function tapItem(e, name, price) {
  e.preventDefault();
  addItem(name, price);
}
function tapModal(e, meat, price) {
  e.preventDefault();
  openModal(meat, price);
}

function showCat(id, btn) {
  var cats = ['stirfry','rice','noodle','soup','chef','other'];
  for(var i=0;i<cats.length;i++)
    document.getElementById('cat-'+cats[i]).style.display = 'none';
  document.getElementById('cat-'+id).style.display = 'block';
  var btns = document.getElementById('tabBar').getElementsByTagName('button');
  for(var j=0;j<btns.length;j++) btns[j].className = '';
  btn.className = 'active';
  document.getElementById('menuPanel').scrollTop = 0;
}


var cart = [], uid = 0, orderType = '內用', records = [], orderNo = 0;
var takeoutCount = 0;
var takeoutDate = '';

// 從 localStorage 載入歷史訂單
(function(){
  try {
    var saved = localStorage.getItem('pos_records');
    if(saved){ records = JSON.parse(saved); }
    var savedNo = localStorage.getItem('pos_orderNo');
    if(savedNo){ orderNo = parseInt(savedNo)||0; }
  } catch(e){}
})();

function saveRecords() {
  try {
    localStorage.setItem('pos_records', JSON.stringify(records));
    localStorage.setItem('pos_orderNo', String(orderNo));
  } catch(e){}
}

function getTodayStr() {
  var d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function nextTakeoutNo() {
  var today = getTodayStr();
  if(takeoutDate !== today){ takeoutDate = today; takeoutCount = 0; }
  // count today's 外帶 records
  var cnt = 0;
  for(var i=0;i<records.length;i++){
    if(records[i].type==='外帶' && records[i].date===today) cnt++;
  }
  return cnt + 1;
}

function setOtype(type, btn) {
  orderType = type;
  var btns = document.getElementsByClassName('otype-btn');
  for(var i=0;i<btns.length;i++) btns[i].className = 'otype-btn';
  btn.className = 'otype-btn sel';
  var row = document.getElementById('infoRow');
  if(type === '內用') {
    row.innerHTML = '<label>桌號</label><input id="tableNum" type="text" placeholder="桌號" maxlength="10">';
  } else if(type === '外帶') {
    var no = nextTakeoutNo();
    row.innerHTML = '<label>外帶號</label><span class="take-num" id="takeNo">' + no + '</span>';
  } else {
    row.innerHTML = '<label>地址</label><input id="tableNum" type="text" placeholder="外送地址" maxlength="50" style="width:180px;">';
  }
}

function addItem(name, price) {
  for(var i=0;i<cart.length;i++){
    if(cart[i].name===name && cart[i].sub===''){
      cart[i].qty++; renderCart(); showToast('已加入：'+name); return;
    }
  }
  cart.push({id:++uid, name:name, price:price, sub:'', qty:1});
  renderCart(); showToast('已加入：'+name);
}

function changeQty(id, d) {
  for(var i=0;i<cart.length;i++){
    if(cart[i].id===id){
      cart[i].qty += d;
      if(cart[i].qty <= 0) cart.splice(i,1);
      break;
    }
  }
  renderCart();
}

function removeItem(id) {
  for(var i=0;i<cart.length;i++){
    if(cart[i].id===id){ cart.splice(i,1); break; }
  }
  renderCart();
}

function clearCart() {
  if(cart.length===0) return;
  if(confirm('確定清空所有點餐？')){ cart=[]; renderCart(); }
}

function renderCart() {
  var el = document.getElementById('cartList');
  var cnt = document.getElementById('cnt');
  var tot = document.getElementById('total');
  if(cart.length===0){
    el.innerHTML = '<div class="cart-empty">尚未點餐</div>';
    cnt.textContent = '共0項'; tot.textContent = '$0'; return;
  }
  var total=0, totalQty=0, html='';
  for(var i=0;i<cart.length;i++){
    var it=cart[i], lt=it.price*it.qty;
    total+=lt; totalQty+=it.qty;
    html += '<div class="cart-item">'
      +'<button class="ci-del" onclick="removeItem('+it.id+')">&#x2715;</button>'
      +'<div class="ci-name">'+it.name+'</div>'
      +(it.sub ? '<div class="ci-sub">'+it.sub+'</div>' : '')
      +'<div class="ci-right">'
      +'<div class="ci-price">$'+lt+'</div>'
      +'<div class="ci-ctrl">'
      +'<button onclick="changeQty('+it.id+',-1)">&#xFF0D;</button>'
      +'<span class="ci-qty">'+it.qty+'</span>'
      +'<button onclick="changeQty('+it.id+',1)">&#xFF0B;</button>'
      +'</div></div></div>';
  }
  el.innerHTML = html;
  cnt.textContent = '共'+totalQty+'項';
  tot.textContent = '$'+total;
}

var sfMeat='', sfPrice=0, sfSauce='';

function openModal(meat, price) {
  sfMeat=meat; sfPrice=price; sfSauce='';
  document.getElementById('modal-title').textContent = '風味現炒 — '+meat;
  document.getElementById('modal-price').textContent = '$'+price;
  var avail = RESTRICT[meat] || SAUCES;
  var html='';
  for(var i=0;i<SAUCES.length;i++){
    var s=SAUCES[i], ok=false;
    for(var j=0;j<avail.length;j++){ if(avail[j]===s){ok=true;break;} }
    html += '<button class="sauce-btn"'+(ok?'':' disabled')+' onclick="selSauce(this,\''+s+'\')">'+s+'</button>';
  }
  document.getElementById('sauce-grid').innerHTML = html;
  document.getElementById('overlay').className = 'overlay show';
}

function selSauce(btn, s) {
  var btns = document.getElementById('sauce-grid').getElementsByTagName('button');
  for(var i=0;i<btns.length;i++) btns[i].className = 'sauce-btn';
  btn.className = 'sauce-btn sel';
  sfSauce = s;
}

function closeModal() {
  document.getElementById('overlay').className = 'overlay';
}

function closeModalOutside(e) {
  if(e.target === document.getElementById('overlay')) closeModal();
}

function addStirfry() {
  if(!sfSauce){ alert('請選擇醬料！'); return; }
  var name='現炒'+sfMeat, sub='【'+sfSauce+'】';
  for(var i=0;i<cart.length;i++){
    if(cart[i].name===name && cart[i].sub===sub){
      cart[i].qty++; renderCart(); showToast('已加入'); closeModal(); return;
    }
  }
  cart.push({id:++uid, name:name, price:sfPrice, sub:sub, qty:1});
  renderCart(); showToast('已加入：'+name+' '+sub); closeModal();
}

function confirmOrder() {
  if(cart.length===0){ alert('請先選擇餐點！'); return; }
  var table='', display='';
  if(orderType==='外帶'){
    var noEl = document.getElementById('takeNo');
    table = noEl ? noEl.textContent : String(nextTakeoutNo());
    display = '外帶號：' + table;
  } else {
    var inp = document.getElementById('tableNum');
    table = inp ? inp.value.trim() : '';
    if(!table){ alert('請輸入'+(orderType==='內用'?'桌號':'外送地址')+'！'); return; }
    display = (orderType==='內用'?'桌號：':'地址：') + table;
  }
  var total=0;
  for(var i=0;i<cart.length;i++) total+=cart[i].price*cart[i].qty;
  var now=new Date();
  var t=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var remark=document.getElementById('remark').value;
  var today=getTodayStr();
  var newRec = {
    no: ++orderNo,
    type: orderType,
    table: table,
    items: cart.slice(),
    total: total,
    remark: remark,
    time: t,
    date: today,
    synced: false
  };
  records.unshift(newRec);
  saveRecords();
  alert('出單成功！\n【'+orderType+'】 '+display+'\n時間：'+t+'\n總金額：$'+total);
  syncToSheet(newRec, function(ok){ newRec.synced=ok; saveRecords(); if(ok) showToast('已同步到 Firebase ✓'); });
  cart=[]; renderCart();
  document.getElementById('remark').value='';
  // Refresh infoRow for 外帶 (update number)
  if(orderType==='外帶'){
    var no2 = nextTakeoutNo();
    var row = document.getElementById('infoRow');
    row.innerHTML = '<label>外帶號</label><span class="take-num" id="takeNo">'+no2+'</span>';
  } else {
    var inp2 = document.getElementById('tableNum');
    if(inp2) inp2.value='';
  }
}

function openRecords() {
  var el=document.getElementById('recList');
  if(records.length===0){ el.innerHTML='<div class="rec-empty">尚無訂單記錄</div>'; }
  else {
    var html='';
    for(var i=0;i<records.length;i++){
      var r=records[i];
      var tagClass = r.type==='內用'?'tag-dine':r.type==='外帶'?'tag-take':'tag-deliver';
      var items='';
      for(var j=0;j<r.items.length;j++){
        var it=r.items[j];
        items+='<span>'+it.name+(it.sub?' '+it.sub:'')+' x'+it.qty+'</span>';
      }
      var syncBadge = (r.synced
        ? '<span style="color:#27ae60;font-size:11px;margin-left:4px;">☁✓</span>'
        : '<span style="color:#e74c3c;font-size:11px;margin-left:4px;" onclick="syncOne('+i+')" ontouchend="syncOne('+i+');event.preventDefault();">☁重試</span>');
      html+='<div class="rec-item">'
        +'<div class="rec-item-head">'
        +'#'+r.no+' <span class="tag '+tagClass+'">'+r.type+'</span> '+r.table
        +(r.type==='內用'?' ('+r.guests+'人)':'')
        +' &nbsp;'+r.date+' '+r.time
        +syncBadge
        +'<span class="rtotal">$'+r.total+'</span>'
        +'<button class="r-reprint" onclick="reprintOrder('+i+');event.stopPropagation();" ontouchend="reprintOrder('+i+');event.stopPropagation();event.preventDefault();">🖨重印</button>'
        +'</div>'
        +'<div class="rec-item-body">'+items+(r.remark?'<br>備註：'+r.remark:'')+'</div>'
        +'</div>';
    }
    el.innerHTML=html;
  }
  document.getElementById('recOverlay').className='rec-overlay show';
}

function closeRecords() {
  document.getElementById('recOverlay').className='rec-overlay';
}

function syncToSheet(r, callback) {
  var itemStr='';
  for(var i=0;i<r.items.length;i++){
    var it=r.items[i];
    itemStr+=(i?'、':'')+it.name+(it.sub?' '+it.sub:'')+' x'+it.qty;
  }
  db.collection('orders').add({
    no: r.no, date: r.date, time: r.time,
    type: r.type, table: r.table,
    items: itemStr, total: r.total, remark: r.remark||''
  }).then(function(){ if(callback) callback(true); })
    .catch(function(){ if(callback) callback(false); });
}

function syncOne(idx) {
  var r = records[idx];
  if(!r || r.synced) return;
  showToast('同步中…');
  syncToSheet(r, function(ok){
    r.synced = ok;
    showToast(ok ? '同步成功 ✓' : '同步失敗，請重試');
    openRecords();
  });
}

function syncAll() {
  var pending=[];
  for(var i=0;i<records.length;i++){
    if(!records[i].synced) pending.push(i);
  }
  if(pending.length===0){ showToast('全部已同步 ✓'); return; }
  showToast('同步中…');
  var done=0;
  for(var j=0;j<pending.length;j++){
    (function(idx){
      syncToSheet(records[idx], function(ok){
        if(ok) records[idx].synced=true;
        done++;
        if(done===pending.length){
          showToast('同步完成 ✓');
          openRecords();
        }
      });
    })(pending[j]);
  }
}

function reprintOrder(idx) {
  var r = records[idx];
  if(!r) return;
  var tableLabel = r.type==='內用'?'桌號':r.type==='外帶'?'外帶號':'地址';
  var rows='', totalQty=0;
  for(var i=0;i<r.items.length;i++){
    var it=r.items[i], lt=it.price*it.qty;
    totalQty+=it.qty;
    rows+='<tr><td>'+it.name+(it.sub?' '+it.sub:'')+'</td><td align="center">'+it.qty+'</td><td align="right">$'+lt+'</td></tr>';
  }
  var html='<h2>風味食堂</h2>'
    +'<div class="r-meta"><b>【'+r.type+'】</b>　'+tableLabel+'：<b>'+r.table+'</b><br>時間：'+r.date+' '+r.time+'</div>'
    +'<table><tr><th align="left">品項</th><th>數</th><th align="right">小計</th></tr>'+rows+'</table>'
    +'<div class="r-qty">餐點數量：'+totalQty+'份</div>'
    +'<div class="r-total">總金額：$'+r.total+'</div>'
    +'<div class="r-remark">備註：'+(r.remark||'無')+'</div>'
    +'<div class="r-thanks">謝謝光臨，敬請慢用</div>'
    +'<div class="receipt-btns">'
    +'<button class="r-close" onclick="closePrint()">關閉</button>'
    +'<button class="r-print" onclick="window.print()">列印</button>'
    +'</div>';
  document.getElementById('receiptContent').innerHTML = html;
  document.getElementById('printOverlay').className = 'print-overlay show';
}

function printOrder() {
  if(cart.length===0){ alert('請先選擇餐點！'); return; }
  var table='', tableLabel='';
  if(orderType==='外帶'){
    var noEl2=document.getElementById('takeNo');
    table = noEl2 ? noEl2.textContent : '-';
    tableLabel='外帶號';
  } else {
    var inp3=document.getElementById('tableNum');
    table = inp3 ? (inp3.value||'未填') : '未填';
    tableLabel = orderType==='內用'?'桌號':'地址';
  }
  var remark=document.getElementById('remark').value||'無';
  var total=0, totalQty=0, rows='';
  for(var i=0;i<cart.length;i++){
    var it=cart[i], lt=it.price*it.qty; total+=lt; totalQty+=it.qty;
    rows+='<tr><td>'+it.name+(it.sub?' '+it.sub:'')+'</td><td align="center">'+it.qty+'</td><td align="right">$'+lt+'</td></tr>';
  }
  var now=new Date();
  var ts=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' '
    +('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var html='<h2>風味食堂</h2>'
    +'<div class="r-meta"><b>【'+orderType+'】</b>　'+tableLabel+'：<b>'+table+'</b><br>時間：'+ts+'</div>'
    +'<table><tr><th align="left">品項</th><th>數</th><th align="right">小計</th></tr>'+rows+'</table>'
    +'<div class="r-qty">餐點數量：'+totalQty+'份</div>'
    +'<div class="r-total">總金額：$'+total+'</div>'
    +'<div class="r-remark">備註：'+remark+'</div>'
    +'<div class="r-thanks">謝謝光臨，敬請慢用</div>'
    +'<div class="receipt-btns">'
    +'<button class="r-close" onclick="closePrint()">關閉</button>'
    +'<button class="r-print" onclick="window.print()">列印</button>'
    +'</div>';
  document.getElementById('receiptContent').innerHTML = html;
  document.getElementById('printOverlay').className = 'print-overlay show';
}

function closePrint() {
  document.getElementById('printOverlay').className = 'print-overlay';
}

var toastTimer=null;
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.style.display='none'; }, 1400);
}
</script>
