<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>風味食堂 POS</title>
<style>
* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Microsoft JhengHei', Arial, sans-serif; background: #f0f2f5; font-size: 14px; -webkit-user-select: none; user-select: none; }
a, button, [onclick] { cursor: pointer; -webkit-tap-highlight-color: rgba(0,0,0,0.1); touch-action: manipulation; }

.tab-bar {
  background: #fff;
  border-bottom: 2px solid #ddd;
  padding: 6px 8px;
  white-space: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab-bar button {
  display: inline-block;
  padding: 6px 12px;
  margin-right: 4px;
  border: 2px solid #1a1a2e;
  border-radius: 16px;
  background: #fff;
  color: #1a1a2e;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
.tab-bar button.active { background: #1a1a2e; color: #fff; }

.wrap {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  height: calc(100vh - 46px);
}

.menu-panel {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  -webkit-overflow-scrolling: touch;
}

.cat-block { margin-bottom: 14px; }
.cat-title {
  background: #1a1a2e;
  color: #fff;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: bold;
  border-radius: 4px 4px 0 0;
}
.cat-items {
  background: #fff;
  border: 1px solid #ddd;
  border-top: none;
  border-radius: 0 0 4px 4px;
  padding: 8px;
  overflow: hidden;
}
.cat-items:after { content: ''; display: table; clear: both; }

.item-card {
  float: left;
  width: 31%;
  margin: 1%;
  background: #fafafa;
  border: 1.5px solid #e0e0e0;
  border-radius: 6px;
  padding: 8px 4px;
  text-align: center;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(231,76,60,0.2);
}
.item-card:active { background: #ffe0e0; border-color: #e74c3c; }
.item-card .n { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
.item-card .p { font-size: 15px; font-weight: bold; color: #e74c3c; }
.item-card .sp { font-size: 10px; color: #e74c3c; }
.item-card.stirfry { background: #fff8e7; border-color: #f0c040; }
.item-card.stirfry .p { color: #c0720c; }

.cart-panel {
  width: 300px;
  min-width: 260px;
  background: #fff;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-orient: vertical;
  -webkit-flex-direction: column;
  flex-direction: column;
  border-left: 2px solid #ddd;
}
.cart-head {
  background: #e74c3c;
  color: #fff;
  padding: 10px 12px;
  font-weight: bold;
  font-size: 15px;
  overflow: hidden;
}
.cart-head span { float: right; font-size: 12px; opacity: .9; margin-top: 2px; }

.info-row {
  padding: 8px 10px;
  border-bottom: 1px solid #eee;
  background: #fafafa;
  overflow: hidden;
}
.info-row label { font-size: 12px; font-weight: bold; }
.info-row input {
  padding: 5px 8px;
  border: 1.5px solid #ddd;
  border-radius: 5px;
  font-size: 13px;
  text-align: center;
  font-weight: bold;
  width: 70px;
  margin-left: 4px;
}

.cart-list {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  -webkit-overflow-scrolling: touch;
}
.cart-empty { text-align: center; color: #bbb; padding: 30px 0; font-size: 13px; }

.cart-item {
  border: 1px solid #eee;
  border-radius: 6px;
  padding: 7px 8px;
  margin-bottom: 6px;
  background: #fafafa;
  overflow: hidden;
}
.ci-name { font-size: 13px; font-weight: bold; float: left; max-width: 55%; }
.ci-sub { font-size: 11px; color: #888; clear: left; margin-top: 1px; }
.ci-right { float: right; text-align: right; }
.ci-price { font-size: 13px; font-weight: bold; color: #e74c3c; }
.ci-ctrl { margin-top: 4px; }
.ci-ctrl button {
  width: 26px; height: 26px;
  border: 1.5px solid #ddd;
  border-radius: 4px;
  background: #fff;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  vertical-align: middle;
}
.ci-ctrl button:active { background: #e74c3c; color: #fff; border-color: #e74c3c; }
.ci-qty { display: inline-block; width: 22px; text-align: center; font-weight: bold; vertical-align: middle; }
.ci-del { float: right; background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 0 2px; }
.ci-del:active { color: #e74c3c; }

.remark-wrap { padding: 0 8px 6px; }
.remark-wrap textarea {
  width: 100%; padding: 6px 8px;
  border: 1.5px solid #ddd; border-radius: 5px;
  font-size: 12px; resize: none; height: 40px;
  font-family: inherit;
}

.cart-foot { border-top: 2px solid #eee; padding: 10px 12px; }
.total-row { overflow: hidden; margin-bottom: 10px; }
.total-row .label { float: left; font-size: 18px; font-weight: bold; }
.total-row .amount { float: right; font-size: 22px; font-weight: bold; color: #e74c3c; }
.btn-row { overflow: hidden; }
.btn-row button {
  float: left;
  padding: 11px 0;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  margin-right: 5px;
}
.btn-clear { width: 22%; background: #f0f0f0; color: #555; }
.btn-print { width: 32%; background: #27ae60; color: #fff; }
.btn-order { width: 40%; background: #e74c3c; color: #fff; margin-right: 0 !important; }

.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.55);
  z-index: 300;
}
.overlay.show { display: block; }
.modal {
  position: absolute;
  top: 50%; left: 50%;
  -webkit-transform: translate(-50%, -50%);
  transform: translate(-50%, -50%);
  background: #fff;
  border-radius: 10px;
  padding: 20px;
  width: 90%;
  max-width: 420px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 { font-size: 16px; margin-bottom: 14px; color: #1a1a2e; }
.modal-label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 8px; }
.sauce-grid { overflow: hidden; margin-bottom: 12px; }
.sauce-btn {
  float: left;
  margin: 3px;
  padding: 8px 12px;
  border: 2px solid #ddd;
  border-radius: 6px;
  background: #fff;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
.sauce-btn.sel { background: #e74c3c; color: #fff; border-color: #e74c3c; }
.sauce-btn:disabled { opacity: .3; }
.modal-price { text-align: center; font-size: 22px; font-weight: bold; color: #e74c3c; margin: 12px 0; }
.modal-btns { overflow: hidden; margin-top: 14px; }
.modal-btns button {
  float: left; width: 48%;
  padding: 11px 0;
  border: none; border-radius: 7px;
  font-size: 14px; font-weight: bold; cursor: pointer;
}
.modal-btns .m-cancel { background: #f0f0f0; color: #555; margin-right: 4%; }
.modal-btns .m-add { background: #e74c3c; color: #fff; }

.toast {
  display: none;
  position: fixed;
  bottom: 70px; left: 50%;
  -webkit-transform: translateX(-50%);
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 8px 18px;
  border-radius: 18px;
  font-size: 13px;
  z-index: 500;
  white-space: nowrap;
}

/* Print receipt overlay */
.print-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.6);
  z-index: 600;
}
.print-overlay.show { display: block; }
.receipt {
  position: absolute;
  top: 50%; left: 50%;
  -webkit-transform: translate(-50%,-50%);
  transform: translate(-50%,-50%);
  background: #fff;
  width: 300px;
  max-height: 85vh;
  overflow-y: auto;
  border-radius: 8px;
  padding: 20px 16px;
}
.receipt h2 { text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 0; }
.receipt .r-store { text-align: center; font-size: 13px; color: #555; margin-bottom: 4px; }
.receipt .r-type-no { text-align: center; font-size: 24px; font-weight: bold; margin: 4px 0 2px; letter-spacing: 1px; }
.receipt .r-count { text-align: center; font-size: 16px; font-weight: bold; margin: 2px 0 6px; }
.receipt .r-dash { border: none; border-top: 1px dashed #999; margin: 6px 0; }
.receipt .r-meta { font-size: 12px; margin: 3px 0; line-height: 1.7; }
.receipt .r-item-block { margin: 8px 0; overflow: hidden; }
.receipt .r-item-row { overflow: hidden; font-size: 16px; font-weight: bold; line-height: 1.4; }
.receipt .r-item-row .i-name { float: left; }
.receipt .r-item-row .i-price { float: right; }
.receipt .r-item-sub { font-size: 12px; color: #555; padding-left: 8px; margin-top: 1px; clear: both; }
.receipt .r-total-block { text-align: center; margin: 6px 0 2px; }
.receipt .r-total { font-size: 22px; font-weight: bold; color: #000; }
.receipt .r-remark { font-size: 12px; color: #555; margin: 3px 0; }
.receipt .r-thanks { text-align: center; font-size: 12px; margin-top: 6px; color: #555; }
.receipt .r-footer { text-align: center; font-size: 11px; color: #999; margin-top: 6px; line-height: 1.6; }
.receipt-btns { overflow: hidden; margin-top: 14px; }
.receipt-btns button {
  float: left; width: 48%;
  padding: 10px; border: none; border-radius: 6px;
  font-size: 14px; font-weight: bold; cursor: pointer;
}
.r-close { background: #f0f0f0; color: #555; margin-right: 4%; }
.r-print { background: #27ae60; color: #fff; }

/* Order type */
.otype-row { padding: 6px 10px; border-bottom: 1px solid #eee; background: #fff; overflow: hidden; }
.otype-btn {
  float: left; padding: 5px 12px; margin-right: 6px;
  border: 2px solid #ddd; border-radius: 16px;
  background: #fff; font-size: 12px; font-weight: bold; cursor: pointer;
  touch-action: manipulation;
}
.otype-btn.sel { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.take-num { display: inline-block; font-size: 22px; font-weight: bold; color: #e74c3c; margin-left: 8px; vertical-align: middle; }

/* Records */
.rec-overlay {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.6); z-index: 700;
}
.rec-overlay.show { display: block; }
.rec-box {
  position: absolute; top: 50%; left: 50%;
  -webkit-transform: translate(-50%,-50%);
  transform: translate(-50%,-50%);
  background: #fff; border-radius: 10px;
  width: 92%; max-width: 560px;
  max-height: 82vh; overflow: hidden;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
}
.rec-head {
  background: #1a1a2e; color: #fff;
  padding: 12px 16px; font-weight: bold; font-size: 15px;
  overflow: hidden;
}
.rec-head button {
  float: right; background: rgba(255,255,255,.2); border: none;
  color: #fff; border-radius: 5px; padding: 3px 10px;
  font-size: 13px; cursor: pointer;
}
.rec-list { -webkit-box-flex:1; -webkit-flex:1; flex:1; overflow-y: auto; padding: 10px; }
.rec-empty { text-align: center; color: #bbb; padding: 30px 0; }
.rec-item {
  border: 1px solid #eee; border-radius: 7px;
  margin-bottom: 8px; overflow: hidden;
}
.rec-item-head {
  background: #f5f5f5; padding: 7px 10px; overflow: hidden;
  font-size: 12px; font-weight: bold;
}
.rec-item-head .tag {
  display: inline-block; padding: 2px 8px;
  border-radius: 10px; font-size: 11px; margin-left: 6px;
}
.tag-dine { background: #e3f0ff; color: #1a6bb5; }
.tag-take { background: #fff3e0; color: #e67c00; }
.tag-deliver { background: #e8f5e9; color: #27ae60; }
.rec-item-head .rtotal { float: right; color: #e74c3c; font-size: 14px; }
.rec-item-head .r-reprint { float: right; margin-right: 8px; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
.rec-item-body { padding: 6px 10px; font-size: 12px; color: #555; }
.rec-item-body span { margin-right: 12px; }

/* ===== 登入畫面 ===== */
.login-overlay {
  display: none;
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: #1a1a2e; z-index: 9999;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
}
.login-overlay.show {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
}
.login-box {
  background: #fff; border-radius: 16px; padding: 36px 28px;
  width: 88%; max-width: 360px; text-align: center;
}
.login-box h2 { font-size: 22px; margin-bottom: 6px; color: #1a1a2e; }
.login-box p { color: #888; font-size: 13px; margin-bottom: 20px; }
.login-box input {
  width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px;
  font-size: 18px; text-align: center; letter-spacing: 4px; margin-bottom: 16px;
}
.login-box input:focus { border-color: #e74c3c; outline: none; }
.login-store-btns { display: -webkit-box; display: -webkit-flex; display: flex; gap: 10px; }
.login-store-btns button {
  -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
  padding: 14px 0; border: none; border-radius: 10px;
  font-size: 16px; font-weight: bold; cursor: pointer;
  touch-action: manipulation;
}
.btn-store-a { background: #e74c3c; color: #fff; }
.btn-store-b { background: #1a1a2e; color: #fff; }
.login-err { color: #e74c3c; font-size: 13px; margin-top: 10px; min-height: 18px; }

.store-badge {
  display: inline-block; background: rgba(255,255,255,0.2);
  border-radius: 10px; padding: 2px 10px; font-size: 12px; margin-left: 8px;
}
.logout-btn {
  float: right; background: rgba(255,255,255,0.2); border: none;
  color: #fff; border-radius: 5px; padding: 3px 10px;
  font-size: 12px; cursor: pointer; margin-top: 1px;
}

/* ===== 手機版 ===== */
@media (max-width: 768px) {
  .wrap { display: block; height: auto; }

  .menu-panel {
    width: 100%;
    height: calc(100vh - 46px);
    padding-bottom: 80px;
  }

  .item-card { width: 48%; margin: 1%; }

  .cart-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    width: 100%;
    height: 75vh;
    border-left: none;
    border-top: 3px solid #e74c3c;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
    z-index: 500;
    -webkit-transform: translateY(100%);
    transform: translateY(100%);
    -webkit-transition: -webkit-transform 0.3s;
    transition: transform 0.3s;
  }
  .cart-panel.open {
    -webkit-transform: translateY(0);
    transform: translateY(0);
  }

  .cart-fab {
    display: -webkit-box !important;
    display: -webkit-flex !important;
    display: flex !important;
  }

  .otype-row { padding: 6px 8px; }
  .otype-row button { padding: 8px 12px; font-size: 13px; }
}

@media (min-width: 769px) {
  .cart-fab { display: none !important; }
  .cart-panel { -webkit-transform: none !important; transform: none !important; }
}

.cart-fab {
  display: none;
  position: fixed;
  bottom: 16px; left: 0; right: 0;
  z-index: 490;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
  justify-content: center;
}
.cart-fab button {
  background: #e74c3c;
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 14px 32px;
  font-size: 16px;
  font-weight: bold;
  box-shadow: 0 4px 16px rgba(231,76,60,0.5);
  cursor: pointer;
  touch-action: manipulation;
}

@media print {
  /* 隱藏所有非收據元素 */
  .header, .tab-bar, .menu-panel, .cart-panel,
  .wrap, .login-overlay, .modal-overlay,
  .cart-fab, .rec-panel { display: none !important; }

  /* 頁面設定：80mm 熱感紙（約 72mm 可印寬） */
  @page {
    size: 80mm auto;
    margin: 2mm 3mm;
  }

  html, body {
    width: 80mm !important;
    margin: 0 !important;
    padding: 0 !important;
    background: #fff !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .print-overlay {
    display: block !important;
    position: static !important;
    background: none !important;
    width: 100% !important;
  }

  .receipt {
    position: static !important;
    -webkit-transform: none !important;
    transform: none !important;
    width: 100% !important;
    max-height: none !important;
    overflow: visible !important;
    border-radius: 0 !important;
    border: none !important;
    box-shadow: none !important;
    padding: 2mm 0 !important;
    font-size: 12px !important;
    font-family: 'Microsoft JhengHei', Arial, sans-serif !important;
  }

  .receipt h2 { font-size: 15px !important; }
  .receipt .r-store { font-size: 12px !important; }
  .receipt .r-type-no { font-size: 22px !important; }
  .receipt .r-count { font-size: 15px !important; }
  .receipt .r-dash { border-top: 1px dashed #000 !important; margin: 3mm 0 !important; }
  .receipt .r-meta { font-size: 11px !important; }
  .receipt .r-item-row { font-size: 15px !important; }
  .receipt .r-item-sub { font-size: 11px !important; }
  .receipt .r-total { font-size: 20px !important; color: #000 !important; }
  .receipt .r-remark { font-size: 11px !important; color: #000 !important; }
  .receipt .r-thanks { font-size: 11px !important; color: #000 !important; }
  .receipt .r-footer { font-size: 10px !important; color: #000 !important; }
  .receipt-btns { display: none !important; }
}
</style>
</head>
<body ontouchstart="">

<!-- 登入畫面 -->
<div class="login-overlay show" id="loginOverlay">
  <div class="login-box">
    <h2>🍽 風味食堂 POS</h2>
    <p>請選擇分店並輸入密碼</p>
    <input type="password" id="loginPwd" placeholder="輸入密碼" maxlength="10">
    <div class="login-store-btns">
      <button class="btn-store-a" onclick="doLogin('中正店')" ontouchend="doLogin('中正店');event.preventDefault();">中正店</button>
      <button class="btn-store-b" onclick="doLogin('大埔店')" ontouchend="doLogin('大埔店');event.preventDefault();">大埔店</button>
    </div>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="tab-bar" id="tabBar">
  <button class="active" onclick="showCat('stirfry',this)">現炒</button>
  <button onclick="showCat('rice',this)">炒飯</button>
  <button onclick="showCat('noodle',this)">炒麵</button>
  <button onclick="showCat('soup',this)">例湯</button>
  <button onclick="showCat('chef',this)">主廚菜</button>
  <button onclick="showCat('other',this)">其他</button>
</div>

<div class="wrap">
  <div class="menu-panel" id="menuPanel">

    <div class="cat-block" id="cat-stirfry">
      <div class="cat-title">🥘 風味現炒（附白飯）</div>
      <div class="cat-items">
        <div class="item-card stirfry" ontouchend="tapModal(event,'豬柳',140)" onclick="openModal('豬柳',140)">
          <div class="n">豬柳</div><div class="p">$140</div><div class="sp">選醬料</div>
        </div>
        <div class="item-card stirfry" ontouchend="tapModal(event,'雞肉',140)" onclick="openModal('雞肉',140)">
          <div class="n">雞肉</div><div class="p">$140</div><div class="sp">選醬料</div>
        </div>
        <div class="item-card stirfry" ontouchend="tapModal(event,'牛肉',150)" onclick="openModal('牛肉',150)">
          <div class="n">牛肉</div><div class="p">$150</div><div class="sp">選醬料</div>
        </div>
        <div class="item-card stirfry" ontouchend="tapModal(event,'松板豬',170)" onclick="openModal('松板豬',170)">
          <div class="n">松板豬</div><div class="p">$170</div><div class="sp">選醬料</div>
        </div>
      </div>
    </div>

    <div class="cat-block" id="cat-rice" style="display:none">
      <div class="cat-title">🍳 風味炒飯</div>
      <div class="cat-items" id="items-rice"></div>
    </div>
    <div class="cat-block" id="cat-noodle" style="display:none">
      <div class="cat-title">🍜 風味炒麵</div>
      <div class="cat-items" id="items-noodle"></div>
    </div>

function doLogin(store) {

  if(STORE_PASSWORDS[store] !== pwd){
    document.getElementById('loginErr').textContent = '密碼錯誤，請再試一次';
    return;
  }
  currentStore = store;

  document.getElementById('loginOverlay').className = 'login-overlay';
  document.getElementById('storeBadge').textContent = store;

function doLogout() {
  if(!confirm('確定登出？')) return;
  currentStore = '';
  try { localStorage.removeItem('pos_store'); } catch(e){}
  cart = []; records = []; orderNo = 0;
  renderCart();
  document.getElementById('storeBadge').textContent = '';
  document.getElementById('loginOverlay').className = 'login-overlay show';
}

function loadStoreRecords() {
  try {
    var key = 'pos_records_' + currentStore;
    var saved = localStorage.getItem(key);
    records = saved ? JSON.parse(saved) : [];
    var savedNo = localStorage.getItem('pos_orderNo_' + currentStore);
    orderNo = savedNo ? (parseInt(savedNo)||0) : 0;
  } catch(e){ records = []; orderNo = 0; }
}

function loadFromFirebase() {
  if(!currentStore) return;
  db.collection(currentStore).get().then(function(snapshot) {
    var fbRecs = [];
    snapshot.forEach(function(doc) {
      var d = doc.data();
      fbRecs.push({
        no: d.no, store: currentStore,
        type: d.type, table: d.table,
        items: d.items,   // string format from Firebase
        total: d.total, remark: d.remark||'',
        time: d.time, date: d.date,
        synced: true, fromCloud: true
      });
    });
    // 合併：本地有的保留，Firebase 有但本地沒有的補進來
    var localNos = {};
    for(var i=0;i<records.length;i++) localNos[records[i].no] = true;
    for(var j=0;j<fbRecs.length;j++){
      if(!localNos[fbRecs[j].no]) records.push(fbRecs[j]);
    }
    // 依訂單編號排序（新的在前）
    records.sort(function(a,b){ return b.no - a.no; });
    // 更新 orderNo
    if(records.length > 0 && records[0].no > orderNo) orderNo = records[0].no;
    saveRecords();
    showToast('訂單記錄已同步 ✓');
  }).catch(function(err){ console.log('Firebase load err:', err); });
}

function saveRecords() {
  if(!currentStore) return;
  try {
    localStorage.setItem('pos_records_' + currentStore, JSON.stringify(records));
    localStorage.setItem('pos_orderNo_' + currentStore, String(orderNo));
  } catch(e){}
}

function getTodayStr() {
  var d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function nextTakeoutNo() {
  var today = getTodayStr();
  if(takeoutDate !== today){ takeoutDate = today; takeoutCount = 0; }
  // count today's 外帶 records
  var cnt = 0;
  for(var i=0;i<records.length;i++){
    if(records[i].type==='外帶' && records[i].date===today) cnt++;
  }
  return cnt + 1;
}

function addItem(name, price) {
  for(var i=0;i<cart.length;i++){
    if(cart[i].name===name && cart[i].sub===''){
      cart[i].qty++; renderCart(); showToast('已加入：'+name); return;
    }
  }
  cart.push({id:++uid, name:name, price:price, sub:'', qty:1});
  renderCart(); showToast('已加入：'+name);
}

function changeQty(id, d) {
  for(var i=0;i<cart.length;i++){
    if(cart[i].id===id){
      cart[i].qty += d;
      if(cart[i].qty <= 0) cart.splice(i,1);
      break;
    }
  }
  renderCart();
}

function removeItem(id) {
  for(var i=0;i<cart.length;i++){
    if(cart[i].id===id){ cart.splice(i,1); break; }
  }
  renderCart();
}

function clearCart() {
  if(cart.length===0) return;
  if(confirm('確定清空所有點餐？')){ cart=[]; renderCart(); var p=document.querySelector('.cart-panel'); if(p) p.className=p.className.replace(' open',''); }
}

function renderCart() {
  var el = document.getElementById('cartList');
  var cnt = document.getElementById('cnt');
  var tot = document.getElementById('total');
  if(cart.length===0){
    el.innerHTML = '<div class="cart-empty">尚未點餐</div>';
    cnt.textContent = '共0項'; tot.textContent = '$0'; return;
  }
  var total=0, totalQty=0, html='';
  for(var i=0;i<cart.length;i++){
    var it=cart[i], lt=it.price*it.qty;
    total+=lt; totalQty+=it.qty;
    html += '<div class="cart-item">'
      +'<button class="ci-del" onclick="removeItem('+it.id+')">&#x2715;</button>'
      +'<div class="ci-name">'+it.name+'</div>'
      +(it.sub ? '<div class="ci-sub">'+it.sub+'</div>' : '')
      +'<div class="ci-right">'
      +'<div class="ci-price">$'+lt+'</div>'
      +'<div class="ci-ctrl">'
      +'<button onclick="changeQty('+it.id+',-1)">&#xFF0D;</button>'
      +'<span class="ci-qty">'+it.qty+'</span>'
      +'<button onclick="changeQty('+it.id+',1)">&#xFF0B;</button>'
      +'</div></div></div>';
  }
  el.innerHTML = html;
  cnt.textContent = '共'+totalQty+'項';
  tot.textContent = '$'+total;
  var fab = document.getElementById('fabCount');
  if(fab) fab.textContent = totalQty+'項 $'+total;
}

function confirmOrder() {
  if(cart.length===0){ alert('請先選擇餐點！'); return; }
  var table='', display='';
  if(orderType==='外帶'){
    var noEl = document.getElementById('takeNo');
    table = noEl ? noEl.textContent : String(nextTakeoutNo());
    display = '外帶號：' + table;
  } else {
    var inp = document.getElementById('tableNum');
    table = inp ? inp.value.trim() : '';
    if(!table){ alert('請輸入'+(orderType==='內用'?'桌號':'外送地址')+'！'); return; }
    display = (orderType==='內用'?'桌號：':'地址：') + table;
  }
  var total=0;
  for(var i=0;i<cart.length;i++) total+=cart[i].price*cart[i].qty;
  var now=new Date();
  var t=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var remark=document.getElementById('remark').value;
  var today=getTodayStr();
  var newRec = {
    no: ++orderNo,
    store: currentStore,
    type: orderType,
    table: table,
    items: cart.slice(),
    total: total,
    remark: remark,
    time: t,
    date: today,
    synced: false
  };
  records.unshift(newRec);
  saveRecords();
  alert('出單成功！\n【'+orderType+'】 '+display+'\n時間：'+t+'\n總金額：$'+total);
  syncToGAS(newRec);
  syncToSheet(newRec, function(ok){ newRec.synced=ok; saveRecords(); if(ok) showToast('已同步到 Firebase ✓'); });
  cart=[]; renderCart();
  var cp=document.querySelector('.cart-panel'); if(cp) cp.className=cp.className.replace(' open','');
  document.getElementById('remark').value='';
  // Refresh infoRow for 外帶 (update number)
  if(orderType==='外帶'){
    var no2 = nextTakeoutNo();
    var row = document.getElementById('infoRow');
    row.innerHTML = '<label>外帶號</label><span class="take-num" id="takeNo">'+no2+'</span>';
  } else {
    var inp2 = document.getElementById('tableNum');
    if(inp2) inp2.value='';
  }
}

function filterRec(mode) {
  recFilter = mode;
  var btnToday = document.getElementById('flt-today');
  var btnAll = document.getElementById('flt-all');
  if(btnToday && btnAll){
    btnToday.style.background = mode==='today'?'#1a1a2e':'#fff';
    btnToday.style.color = mode==='today'?'#fff':'#555';
    btnAll.style.background = mode==='all'||mode==='date'?'#1a1a2e':'#fff';
    btnAll.style.color = mode==='all'||mode==='date'?'#fff':'#555';
  }
  renderRecList();
}

function renderRecList() {
  var el = document.getElementById('recList');
  var today = getTodayStr();
  var filterDate = '';
  if(recFilter==='date'){
    var di = document.getElementById('flt-date');
    filterDate = di ? di.value : '';
  }
  var filtered = [];
  for(var i=0;i<records.length;i++){
    var r = records[i];
    if(recFilter==='today' && r.date !== today) continue;
    if(recFilter==='date' && filterDate && r.date !== filterDate) continue;
    filtered.push({r:r, idx:i});
  }
  if(filtered.length===0){ el.innerHTML='<div class="rec-empty">無訂單記錄</div>'; return; }
  var html='';
  for(var k=0;k<filtered.length;k++){
    var r=filtered[k].r, i=filtered[k].idx;
    var tagClass = r.type==='內用'?'tag-dine':r.type==='外帶'?'tag-take':'tag-deliver';
    var items='';
    // 判斷 items 是物件陣列還是字串
    var isObjArr = r.items && r.items.length > 0 && typeof r.items[0] === 'object' && r.items[0] !== null;
    if(isObjArr){
      for(var j=0;j<r.items.length;j++){
        var it=r.items[j];
        items+='<span>'+it.name+(it.sub?' ('+it.sub+')':'')+' x'+it.qty+'</span> ';
      }
    } else if(r.items){
      items = '<span>'+ r.items +'</span>';
    }
    var syncBadge = (r.synced
      ? '<span style="color:#27ae60;font-size:11px;margin-left:4px;">☁✓</span>'
      : '<span style="color:#e74c3c;font-size:11px;margin-left:4px;" onclick="syncOne('+i+')" ontouchend="syncOne('+i+');event.preventDefault();">☁重試</span>');
    html+='<div class="rec-item">'
      +'<div class="rec-item-head">'
      +'<button onclick="deleteRecord('+i+')" ontouchend="deleteRecord('+i+');event.preventDefault();" style="float:left;background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 4px 0 0;line-height:1;">✕</button>'
      +'#'+r.no+' <span class="tag '+tagClass+'">'+r.type+'</span> '+r.table
      +' &nbsp;'+r.date+' '+r.time
      +syncBadge
      +'<span class="rtotal">$'+r.total+'</span>'
      +'<button class="r-reprint" onclick="reprintOrder('+i+');event.stopPropagation();" ontouchend="reprintOrder('+i+');event.stopPropagation();event.preventDefault();">🖨重印</button>'
      +'</div>'
      +'<div class="rec-item-body">'+items+(r.remark?'<br>備註：'+r.remark:'')+'</div>'
      +'</div>';
  }
  el.innerHTML=html;
}

function deleteRecord(idx) {
  if(!confirm('確定刪除此筆訂單記錄？')) return;
  records.splice(idx, 1);
  saveRecords();
  renderRecList();
}

function openRecords() {
  filterRec(recFilter);
  document.getElementById('recOverlay').className='rec-overlay show';
}

function closeRecords() {
  document.getElementById('recOverlay').className='rec-overlay';
}

function syncToSheet(r, callback) {
  var itemStr='';
  for(var i=0;i<r.items.length;i++){
    var it=r.items[i];
    itemStr+=(i?'、':'')+it.name+(it.sub?' '+it.sub:'')+' x'+it.qty;
  }
  var col = r.store || 'orders';
  db.collection(col).add({
    no: r.no, date: r.date, time: r.time,
    type: r.type, table: r.table,
    items: itemStr, total: r.total, remark: r.remark||''
  }).then(function(){ if(callback) callback(true); })
    .catch(function(){ if(callback) callback(false); });
}

function syncToGAS(r) {
  if(!GAS_URL) return;
  var itemStr='';
  for(var i=0;i<r.items.length;i++){
    var it=r.items[i];
    itemStr+=(i?'、':'')+it.name+(it.sub?' '+it.sub:'')+' x'+it.qty;
  }
  var body = JSON.stringify({
    store: r.store||'', no: r.no, date: r.date, time: r.time,
    type: r.type, table: r.table,
    items: itemStr, total: r.total, remark: r.remark||''
  });
  if(window.fetch){
    fetch(GAS_URL, { method:'POST', mode:'no-cors', body: body });
  } else {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', GAS_URL, true);
    xhr.send(body);
  }
}

function syncOne(idx) {
  var r = records[idx];
  if(!r || r.synced) return;
  showToast('同步中…');
  syncToSheet(r, function(ok){
    r.synced = ok;
    showToast(ok ? '同步成功 ✓' : '同步失敗，請重試');
    renderRecList();
  });
}

function syncAll() {
  var pending=[];
  for(var i=0;i<records.length;i++){
    if(!records[i].synced) pending.push(i);
  }
  if(pending.length===0){ showToast('全部已同步 ✓'); return; }
  showToast('同步中…');
  var done=0;
  for(var j=0;j<pending.length;j++){
    (function(idx){
      syncToSheet(records[idx], function(ok){
        if(ok) records[idx].synced=true;
        done++;
        if(done===pending.length){
          showToast('同步完成 ✓');
          renderRecList();
        }
      });
    })(pending[j]);
  }
}

function buildReceiptHtml(type, tableVal, dateStr, timeStr, itemsArr, total, remark, orderNo, storeName, printTime) {
  var tableLabel = type==='內用'?'桌號：':type==='外帶'?'外帶號：':'地址：';
  var totalQty = 0;
  var itemBlocks = '';
  for(var i=0;i<itemsArr.length;i++){
    var it = itemsArr[i];
    var subtotal = it.price * it.qty;
    totalQty += it.qty;
    itemBlocks += '<div class="r-item-block">'
      +'<div class="r-item-row">'
      +'<span class="i-name">'+it.qty+' x '+it.name+'</span>'
      +'<span class="i-price">$'+subtotal+'</span>'
      +'</div>'
      +(it.sub ? '<div class="r-item-sub">'+it.sub+'</div>' : '')
      +'</div>';
  }
  var typeLabel = type==='內用'?'內用':type==='外帶'?'外帶 No.'+tableVal:'外送';
  var metaTable = (type==='外送') ? '＊地址：'+tableVal+'<br>' : (type==='內用'?'＊桌號：'+tableVal+'<br>':'');
  var remarkLine = (remark && remark!=='無') ? '<div class="r-meta">＊備註：'+remark+'</div><hr class="r-dash">' : '';
  var html = '<h2>風味食堂</h2>'
    +'<div class="r-store">'+(storeName||'')+'</div>'
    +'<hr class="r-dash">'
    +'<div class="r-type-no">'+typeLabel+'</div>'
    +'<div class="r-count">共 '+totalQty+' 份餐點</div>'
    +'<hr class="r-dash">'
    +'<div class="r-meta">＊時間：'+dateStr+' '+timeStr+'</div>'
    +metaTable
    +'<hr class="r-dash">'
    +remarkLine
    +itemBlocks
    +'<hr class="r-dash">'
    +'<div class="r-total-block"><div class="r-total">合計：$'+total+'</div></div>'
    +'<hr class="r-dash">'
    +'<div class="r-thanks">謝謝光臨，敬請慢用</div>'
    +'<div class="r-footer">序號：#'+orderNo+'　列印：'+(printTime||timeStr)+'</div>'
    +'<div class="receipt-btns">'
    +'<button class="r-close" onclick="closePrint()">關閉</button>'
    +'<button class="r-print" onclick="window.print()">列印</button>'
    +'</div>';
  return html;
}

function reprintOrder(idx) {
  var r = records[idx];
  if(!r) return;
  var now = new Date();
  var printTime = ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var html = buildReceiptHtml(r.type, r.table, r.date, r.time, r.items, r.total, r.remark||'', r.no, r.store||currentStore, printTime);
  document.getElementById('receiptContent').innerHTML = html;
  document.getElementById('printOverlay').className = 'print-overlay show';
}

function printOrder() {
  if(cart.length===0){ alert('請先選擇餐點！'); return; }
  var table='';
  if(orderType==='外帶'){
    var noEl2=document.getElementById('takeNo');
    table = noEl2 ? noEl2.textContent : '-';
  } else {
    var inp3=document.getElementById('tableNum');
    table = inp3 ? (inp3.value||'未填') : '未填';
  }
  var remark=document.getElementById('remark').value||'';
  var total=0;
  for(var i=0;i<cart.length;i++){ total+=cart[i].price*cart[i].qty; }
  var now=new Date();
  var dateStr=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate();
  var timeStr=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  var html = buildReceiptHtml(orderType, table, dateStr, timeStr, cart, total, remark, orderNo, currentStore, timeStr);
  document.getElementById('receiptContent').innerHTML = html;
  document.getElementById('printOverlay').className = 'print-overlay show';
}

function closePrint() {
  document.getElementById('printOverlay').className = 'print-overlay';
}

var toastTimer=null;
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.style.display='none'; }, 1400);
}
</script>

</html>
